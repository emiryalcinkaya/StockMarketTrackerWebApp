<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tradeon</title>
</head>
<body>

    <div class="auth-container">

        <div class="glass-card auth-card">

            <h1>Tradeon</h1>

            <form>

                <input
                    type="email"
                    placeholder="Email"
                >

                <input
                    type="password"
                    placeholder="Password"
                >

                <button type="submit">
                    Sign In
                </button>

            </form>

            <p>
                Don't have an account?
                <a href="register.html">Register</a>
            </p>

        </div>

    </div>

</body>
</html>
